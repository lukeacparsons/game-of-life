<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="An interactive Conway's Game of Life visualisation."
    />
    <title>Game of Life</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="toolbar" aria-label="Simulation controls">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Game of Life</h1>
            <p>Conway's cellular automaton</p>
          </div>
        </div>

        <div class="control-row">
          <button id="play" class="primary" type="button" aria-pressed="true">
            Pause
          </button>
          <button id="step" type="button">Step</button>
          <button id="random" type="button">Random</button>
          <button id="clear" type="button">Clear</button>
        </div>

        <div class="control-grid">
          <label>
            Speed
            <input id="speed" type="range" min="1" max="60" value="18" />
          </label>
          <label>
            Density
            <input id="density" type="range" min="4" max="48" value="22" />
          </label>
          <label>
            Scale
            <input id="scale" type="range" min="6" max="24" value="11" />
          </label>
        </div>

        <div class="pattern-bar" aria-label="Pattern presets">
          <button data-pattern="glider" type="button">Glider</button>
          <button data-pattern="gosper" type="button">Gosper gun</button>
          <button data-pattern="pulsar" type="button">Pulsar</button>
          <button data-pattern="acorn" type="button">Acorn</button>
        </div>
      </section>

      <section class="stage" aria-label="Game board">
        <canvas id="life" aria-label="Game of Life grid"></canvas>
        <div class="hud" aria-live="polite">
          <span><strong id="generation">0</strong> gen</span>
          <span><strong id="population">0</strong> alive</span>
          <span id="mode">Draw</span>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
